name: day_architect
description: "A distraction-blocking planner built for Filipino college students."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.6
  sqflite: ^2.3.0
  path_provider: ^2.1.0
  path: ^1.8.0
  flutter_local_notifications: ^17.2.0
  timezone: ^0.9.4
  provider: ^6.1.5+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
